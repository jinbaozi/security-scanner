    template: report-未公开接口.md
    output: report-未公开接口-{component_name}-{date}.md
  fileleak:
    display_name: 敏感文件泄露
    template: report-敏感文件泄露.md
    output: report-敏感文件泄露-{component_name}-{date}.md
  permission:
    display_name: 文件权限
    template: report-文件权限.md
    output: report-文件权限-{component_name}-{date}.md
  crypto:
    display_name: 密码学
    template: report-密码学.md
    output: report-密码学-{component_name}-{date}.md
  network:
    display_name: 网络
