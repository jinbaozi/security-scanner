  secure-coding:
    display_name: 安全编码
    template: report-安全编码.md
    output: report-安全编码-{component_name}-{date}.md
  integrity:
    display_name: 完整性
    template: report-完整性.md
    output: report-完整性-{component_name}-{date}.md
  content-compliance:
    display_name: 内容合规
    template: report-内容合规.md
